name: CI

on:
  push:
  pull_request:

jobs:
  # Both modules are wasmJs-only, so one Linux host covers everything: the public-ABI check,
  # tests under Node and headless Chrome, and staging the worker's npm package.
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: API compatibility check
        run: ./gradlew apiCheck --console=plain

      - name: Build + tests (Node and headless Chrome)
        run: ./gradlew build --console=plain

      - name: Stage the worker npm package
        run: ./gradlew :sqlite-wasm-kt-worker:stageNpmPackage --console=plain

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-reports
          path: "**/build/reports/tests/**"
          if-no-files-found: ignore
